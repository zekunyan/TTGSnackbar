<rect x="80" y="70" width="360" height="34" rx="17" fill="#fff" stroke="none" stroke-width="1" /><text x="260.0" y="93" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="850" fill="#147efb" text-anchor="middle" >Android-style snackbar feedback for iOS</text>
<text x="80" y="205" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="108" font-weight="950" fill="#111827" text-anchor="start" >TTG</text>
<text x="80" y="305" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="108" font-weight="950" fill="#111827" text-anchor="start" >Snackbar</text>
<text x="82" y="360" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="760" fill="#657386" text-anchor="start">
<tspan x="82" dy="0">A polished UIKit snackbar component for transient messages,</tspan>
<tspan x="82" dy="39.6">action recovery, semantic status feedback, custom content,</tspan>
<tspan x="82" dy="39.6">and managed presentation queues.</tspan>
</text>
<rect x="80" y="520" width="290" height="118" rx="18" fill="rgba(255,255,255,0.88)" stroke="#111827" stroke-width="1" filter="url(#shadow)"/>
<text x="102" y="558" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="900" fill="#111827" text-anchor="start" >Actionable Messages</text>
<text x="102" y="587" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="720" fill="#657386" text-anchor="start">
<tspan x="102" dy="0">Primary and secondary actions, icons, and </tspan>
<tspan x="102" dy="17.92">icon-only buttons.</tspan>
</text>
<rect x="395" y="520" width="290" height="118" rx="18" fill="rgba(255,255,255,0.88)" stroke="#111827" stroke-width="1" filter="url(#shadow)"/>
<text x="417" y="558" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="900" fill="#111827" text-anchor="start" >Managed Presentation</text>
<text x="417" y="587" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="720" fill="#657386" text-anchor="start">
<tspan x="417" dy="0">Queue, replace, or drop duplicate messages</tspan>
<tspan x="417" dy="17.92">with a manager.</tspan>
</text>
<rect x="80" y="665" width="290" height="118" rx="18" fill="rgba(255,255,255,0.88)" stroke="#111827" stroke-width="1" filter="url(#shadow)"/>
<text x="102" y="703" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="900" fill="#111827" text-anchor="start" >Product States</text>
<text x="102" y="732" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="720" fill="#657386" text-anchor="start">
<tspan x="102" dy="0">Default, info, success, warning, error, an</tspan>
<tspan x="102" dy="17.92">d loading styles.</tspan>
</text>
<rect x="395" y="665" width="290" height="118" rx="18" fill="rgba(255,255,255,0.88)" stroke="#111827" stroke-width="1" filter="url(#shadow)"/>
<text x="417" y="703" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="900" fill="#111827" text-anchor="start" >Custom UIKit Content</text>
<text x="417" y="732" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="720" fill="#657386" text-anchor="start">
<tspan x="417" dy="0">Embed any UIView, constrain max width, and</tspan>
<tspan x="417" dy="17.92">respect safe areas.</tspan>
</text>
